services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solyluna-app
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - solyluna
    volumes:
      - ./:/var/www/html

  web:
    image: nginx:1.27-alpine
    container_name: solyluna-web
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    networks:
      - solyluna
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./:/var/www/html:ro

  db:
    image: postgres:16-alpine
    container_name: solyluna-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - solyluna

networks:
  solyluna:
    driver: bridge

volumes:
  db_data:
